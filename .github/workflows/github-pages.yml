name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Also run when the scheduled scraper workflow completes
  workflow_run:
    workflows: ["run app.py"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python app.py

      - name: Create .nojekyll file
        run: touch .nojekyll
        
      - name: Prepare deployment files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/
          cp README.md _site/ 2>/dev/null || true
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4